version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

handlers:
  console:
    class: logging.StreamHandler
    formatter: standard
    stream: ext://sys.stdout
  file:
    class: logging.handlers.RotatingFileHandler
    formatter: standard
    filename: logs/tron_sentinel.log
    maxBytes: 10485760   # 10 MB
    backupCount: 5

root:
  level: INFO
  handlers:
    - console
    - file

loggers:
  collectors:
    level: DEBUG
  analyzers:
    level: DEBUG
  alerting:
    level: INFO
