# TRON Sentinel – RSS source configuration
# ──────────────────────────────────────────────────────────────────────────────
# To add a new source: append a block below – no code changes needed.
# To disable a source: set  enabled: false
#
# Fields:
#   name                – unique identifier (stored as `source` in the database)
#   url                 – RSS / Atom feed URL
#   language            – ISO 639-1 code: en | zh | ja | ko …
#   category            – human-readable group label (for display only)
#   enabled             – true | false
#   skip_relevance_check – true to bypass TRON keyword filter (for pre-filtered feeds)

sources:

  # ── Google News TRON/Justin Sun searches (auto skip_relevance_check) ─────────
